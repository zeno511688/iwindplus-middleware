apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: mysql-system
  name: mysql-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mysql-master
  name: mysql-master-nodeport
  namespace: mysql-system
spec:
  type: NodePort
  ports:
    - name: mysql-3306
      nodePort: 30202
      port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app: mysql-master
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mysql-master
  name: mysql-master
  namespace: mysql-system
spec:
  clusterIP: None
  ports:
    - name: mysql-3306
      port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app: mysql-master
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: mysql-master
  name: mysql-master-conf
  namespace: mysql-system
data:
  my.cnf: |-
    [client]
    port = 3306
    default-character-set = utf8mb4
    socket = /var/run/mysqld/mysql.sock

    [mysql]
    no-beep
    prompt = "\u@MariaDB \R:\m:\s [\d]> "
    default-character-set = utf8mb4

    [mysqld]
    server_id = 1
    port = 3306
    user = mysql
    basedir = /usr
    datadir = /var/lib/mysql
    socket = /var/run/mysqld/mysql.sock
    pid-file = /var/run/mysqld/mysqld.pid
    collation-server = utf8mb4_general_ci
    init-connect='SET NAMES utf8mb4'
    character-set-server = utf8mb4
    autocommit = 1
    skip-name-resolve = 0
    max_connections = 800
    max_connect_errors = 100
    default-storage-engine = INNODB
    transaction_isolation = READ-COMMITTED
    explicit_defaults_for_timestamp = 1
    sort_buffer_size = 32M
    join_buffer_size = 128M
    tmp_table_size = 72M
    max_allowed_packet = 16M
    #sql_mode = STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    interactive_timeout = 1800
    wait_timeout = 1800
    read_buffer_size = 16M
    read_rnd_buffer_size = 32M
    lower_case_table_names = 1

    query_cache_type = 1
    query_cache_size = 1M
    table_open_cache = 2000
    thread_cache_size = 768
    myisam_max_sort_file_size = 10G
    myisam_sort_buffer_size = 135M
    key_buffer_size = 32M

    innodb_io_capacity = 4000
    innodb_io_capacity_max = 8000
    innodb_buffer_pool_size = 8G
    innodb_buffer_pool_instances = 8
    innodb_buffer_pool_load_at_startup = 1
    innodb_buffer_pool_dump_at_shutdown = 1
    innodb_lru_scan_depth = 2000
    innodb_lock_wait_timeout = 5
    innodb_log_file_size = 200M
    innodb_log_files_in_group = 2
    innodb_log_buffer_size = 16M

    innodb_flush_neighbors = 1
    innodb_purge_threads = 4
    innodb_large_prefix = 1
    innodb_thread_concurrency = 64
    innodb_print_all_deadlocks = 1
    innodb_strict_mode = 1
    innodb_sort_buffer_size = 64M
    innodb_flush_log_at_trx_commit = 1
    innodb_autoextend_increment = 64
    innodb_concurrency_tickets = 5000
    innodb_old_blocks_time = 1000
    innodb_open_files = 65535
    innodb_stats_on_metadata = 0
    innodb_file_per_table = 1
    innodb_checksum_algorithm = 0
    innodb_data_file_path = ibdata1:200M;ibdata2:200M;ibdata3:200M:autoextend:max:5G
    innodb_temp_data_file_path = ibtmp1:200M;ibtmp2:200M:autoextend:max:20G

    log-basename = master-1
    log-bin = master-1-bin
    log-error = master-1-error.log
    binlog_format = row
    sync_binlog = 1
    max_binlog_size = 512M
    master_info_repository = table
    log-slave-updates = 1

    log_output = FILE
    general_log = 1
    slow_query_log = 1

    log_queries_not_using_indexes = 1
    log_slow_admin_statements = 1
    log_slow_slave_statements = 1
    expire_logs_days = 90
    long_query_time = 10
    min_examined_row_limit = 100

    relay-log = relay-1-bin
    relay_log_recovery = 1
    max_relay_log_size = 512M
    relay_log_purge = 1
    log-warnings = 0
    skip_slave_start = 1
    auto_increment_offset = 1
    auto_increment_increment = 2

    back_log = 1024
    open_files_limit = 65535
    table_definition_cache = 1400
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: mysql-master
  name: mysql-master
  namespace: mysql-system
spec:
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  replicas: 1
  selector:
    matchLabels:
      app: mysql-master
  serviceName: mysql-master
  template:
    metadata:
      labels:
        app: mysql-master
    spec:
      restartPolicy: Always
      containers:
        - name: mysql
          image: mariadb:10.8.3
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: MARIADB_ROOT_PASSWORD
              value: iwindplus@2019
          ports:
            - name: mysql-3306
              containerPort: 3306
              protocol: TCP
          resources:
            limits:
              cpu: '4'
              memory: 10Gi
            requests:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: mysql-conf
              mountPath: /etc/mysql
            - name: mysql-data
              mountPath: /var/lib/mysql
              subPath: mysql
      volumes:
        - name: mysql-conf
          configMap:
            defaultMode: 0420
            name: mysql-master-conf
            optional: false
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: mysql-data
        namespace: mysql-system
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
        storageClassName: alicloud-nas-259a44a286