---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: seata-system
  name: seata-system
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
  name: seata-iwindplus-com
  namespace: seata-system
spec:
  ingressClassName: nginx
  rules:
    - host: seata.iwindplus.com
      http:
        paths:
          - backend:
              service:
                name: seata-server
                port:
                  number: 7091
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - seata.iwindplus.com
      secretName: iwindplus-com-cert
---
apiVersion: v1
data:
  tls.crt: 
  tls.key: 
kind: Secret
metadata:
  name: iwindplus-com-cert
  namespace: seata-system
type: kubernetes.io/tls
