---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seata-server
  namespace: seata-system
  labels:
    app: seata-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seata-server
  template:
    metadata:
      labels:
        app: seata-server
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - app
              weight: 100
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - seata-server
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - env:
          - name: TZ
            value: Asia/Shanghai
          name: seata-server
          image: seataio/seata-server:1.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7091
              name: client
            - containerPort: 8091
              name: server
          volumeMounts:
            - name: seata-resources
              mountPath: /seata-server/resources/application.yml
              subPath: application.yml
      volumes:
        - name: seata-resources
          configMap:
            defaultMode: 0420
            name: seata-conf
            optional: false