    server:
      port: 7091
    spring:
      application:
        name: seata-server
    logging:
      config: classpath:logback-spring.xml
      file:
        path: ${user.home}/logs/seata
    console:
      user:
        username: seata
        password: zaq12wsx
    seata:
      registry:
        type: nacos
